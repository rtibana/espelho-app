<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espelho — seu espaço de reflexão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --bg2: #ffffff;
    --bg3: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1916;
    --muted: #8a8780;
    --accent: #5a7a6e;
    --accent-light: #e8f0ed;
    --user-bg: #e8f0ed;
    --user-border: rgba(90,122,110,0.2);
    --ai-bg: #ffffff;
    --ai-border: rgba(0,0,0,0.08);
    --tag-1: #fdf3e7; --tag-1b: #9a6b2e;
    --tag-2: #e8f0ed; --tag-2b: #3d6b5a;
    --tag-3: #ede8f5; --tag-3b: #6248a0;
    --recording: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; font-size: 15px;
  }

  /* Setup */
  #setup {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px; min-height: 100vh;
  }
  .logo { font-size: 32px; font-weight: 300; letter-spacing: -0.02em; color: var(--text); margin-bottom: 6px; }
  .logo span { color: var(--accent); font-weight: 500; }
  .tagline { font-size: 13px; color: var(--muted); margin-bottom: 40px; letter-spacing: 0.04em; }
  .setup-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 460px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .setup-card label {
    display: block; font-size: 12px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .setup-card input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; padding: 11px 13px; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
  }
  .setup-card input:focus { border-color: var(--accent); }
  .setup-card input::placeholder { color: var(--muted); }
  .topic-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .topic-btn {
    padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--muted); font-family: 'Inter', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.4;
  }
  .topic-btn:hover { color: var(--text); border-color: var(--accent); }
  .topic-btn.active.t1 { background: var(--tag-1); border-color: var(--tag-1b); color: var(--tag-1b); font-weight: 500; }
  .topic-btn.active.t2 { background: var(--tag-2); border-color: var(--tag-2b); color: var(--tag-2b); font-weight: 500; }
  .topic-btn.active.t3 { background: var(--tag-3); border-color: var(--tag-3b); color: var(--tag-3b); font-weight: 500; }
  .start-btn {
    width: 100%; padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s;
  }
  .start-btn:hover { opacity: 0.88; }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; }
  .note a { color: var(--accent); text-decoration: none; }

  /* Chat */
  #chat { display: none; flex-direction: column; height: 100vh; }
  .chat-header {
    padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { font-size: 18px; font-weight: 300; color: var(--text); }
  .header-logo span { color: var(--accent); font-weight: 500; }
  .topic-badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .tb1 { background: var(--tag-1); color: var(--tag-1b); }
  .tb2 { background: var(--tag-2); color: var(--tag-2b); }
  .tb3 { background: var(--tag-3); color: var(--tag-3b); }
  .reset-btn {
    font-size: 12px; color: var(--muted); background: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px;
    cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--border2); }

  .messages {
    flex: 1; overflow-y: auto; padding: 28px 20px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth; background: var(--bg);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .center-messages { margin: auto; width: 100%; max-width: 680px; }

  .msg {
    display: flex; gap: 12px; max-width: 680px; width: 100%;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
  }
  .avatar.ai { background: var(--accent-light); color: var(--accent); border: 1px solid var(--user-border); }
  .avatar.user { background: var(--user-bg); color: var(--accent); border: 1px solid var(--user-border); }

  .bubble { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.65; max-width: 520px; }
  .msg.user .bubble {
    background: var(--user-bg); border: 1px solid var(--user-border);
    color: var(--text); border-top-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bg); border: 1px solid var(--ai-border);
    color: var(--text); border-top-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

  /* Input */
  .input-area {
    padding: 12px 20px 20px; border-top: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 14px; padding: 8px 8px 8px 14px;
    transition: border-color 0.2s; max-width: 680px; margin: 0 auto;
  }
  .input-row:focus-within { border-color: var(--accent); }
  #userInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 15px; resize: none; min-height: 24px; max-height: 120px; line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }

  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; background: transparent;
  }
  .icon-btn svg { width: 18px; height: 18px; }
  #micBtn { color: var(--muted); }
  #micBtn:hover { background: var(--border); }
  #micBtn.recording { background: #fde8e8; color: var(--recording); animation: micPulse 1s ease-in-out infinite; }
  @keyframes micPulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  #sendBtn { background: var(--accent); }
  #sendBtn svg { stroke: white; }
  #sendBtn:hover { opacity: 0.88; background: var(--accent); }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .voice-status {
    text-align: center; font-size: 12px; color: var(--recording);
    height: 18px; max-width: 680px; margin: 5px auto 0;
  }
  .disclaimer { text-align: center; font-size: 11px; color: var(--muted); max-width: 680px; margin: 4px auto 0; }

  .welcome-msg { font-size: 16px; color: var(--muted); line-height: 1.75; margin-bottom: 24px; font-weight: 300; }
  .welcome-msg strong { color: var(--accent); font-weight: 500; }
  .topic-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .topic-pill {
    padding: 8px 16px; border-radius: 99px; font-size: 13px;
    cursor: pointer; transition: opacity 0.15s; border: 1px solid;
    font-family: 'Inter', sans-serif; font-weight: 400;
  }
  .topic-pill:hover { opacity: 0.75; }
  .tp1 { background: var(--tag-1); color: var(--tag-1b); border-color: var(--tag-1b); }
  .tp2 { background: var(--tag-2); color: var(--tag-2b); border-color: var(--tag-2b); }
  .tp3 { background: var(--tag-3); color: var(--tag-3b); border-color: var(--tag-3b); }
</style>
</head>
<body>

<div id="setup">
  <div class="logo"><span>espelho</span></div>
  <div class="tagline">um espaço para pensar em voz alta</div>
  <div class="setup-card">
    <label>Chave da API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <label>Tema desta conversa</label>
    <div class="topic-grid">
      <button class="topic-btn t1" data-topic="saude">Saúde mental &amp; ansiedade</button>
      <button class="topic-btn t2" data-topic="relacionamentos">Relacionamentos &amp; família</button>
      <button class="topic-btn t3" data-topic="identidade">Identidade &amp; autoconhecimento</button>
    </div>
    <label>Seu nome (opcional)</label>
    <input type="text" id="userName" placeholder="Como posso te chamar?">
    <button class="start-btn" id="startBtn" disabled onclick="startChat()">Começar →</button>
    <p class="note">
      Sua chave fica só no seu navegador, nunca em servidores externos.<br>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">Obter chave gratuita →</a>
    </p>
  </div>
</div>

<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="header-logo"><span>espelho</span></div>
      <span class="topic-badge" id="headerBadge"></span>
    </div>
    <button class="reset-btn" onclick="resetChat()">← trocar tema</button>
  </div>
  <div class="messages" id="messages">
    <div class="center-messages">
      <div id="welcomeArea"></div>
      <div class="topic-pills" id="topicPills"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Escreva ou use o microfone para falar..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="icon-btn" id="micBtn" onclick="toggleVoice()" title="Falar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button class="icon-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
    <p class="disclaimer">Protótipo experimental · Não substitui acompanhamento profissional</p>
  </div>
</div>

<script>
const TOPICS = {
  saude: {
    label: 'Saúde mental & ansiedade', class: 'tb1', pillClass: 'tp1',
    starters: ['Algo tem me pesado ultimamente','Quero entender minha ansiedade','Me sinto sobrecarregado(a)'],
    system: `Você é um interlocutor socrático especializado em saúde mental e bem-estar emocional.
Ajude a pessoa a explorar seus pensamentos e sentimentos com perguntas cuidadosas — nunca dê conselhos diretos ou diagnósticos.
- Faça UMA pergunta por vez, profunda e gentil
- Reflita o que a pessoa disse antes de perguntar
- Se detectar sofrimento intenso, pergunte se tem apoio profissional
- Respostas curtas: máximo 3 frases + 1 pergunta
- Tom: acolhedor, presente, sem julgamento`
  },
  relacionamentos: {
    label: 'Relacionamentos & família', class: 'tb2', pillClass: 'tp2',
    starters: ['Tenho conflito com alguém próximo','Quero entender um padrão nas minhas relações','Algo mudou na minha família'],
    system: `Você é um interlocutor socrático especializado em dinâmicas relacionais e vínculos afetivos.
Ajude a pessoa a examinar suas relações com curiosidade e sem julgamento — nunca tome partido.
- Faça UMA pergunta por vez que abra perspectivas novas
- Explore o ponto de vista da pessoa E do outro envolvido
- Respostas curtas: máximo 3 frases + 1 pergunta
- Tom: curioso, neutro, acolhedor`
  },
  identidade: {
    label: 'Identidade & autoconhecimento', class: 'tb3', pillClass: 'tp3',
    starters: ['Estou questionando quem sou','Sinto que estou num momento de mudança','Quero entender meus valores mais profundos'],
    system: `Você é um interlocutor socrático especializado em autoconhecimento e desenvolvimento pessoal.
Guie a pessoa numa exploração filosófica de si mesma usando o método socrático.
- Faça UMA pergunta por vez — profunda, que faça a pessoa parar
- Explore crenças subjacentes e gentilmente aponte contradições
- Respostas curtas: máximo 3 frases + 1 pergunta
- Tom: filosófico, respeitoso, instigante`
  }
};

let selectedTopic = null;
let conversationHistory = [];
let apiKey = '', userName = '';
let isLoading = false;
let recognition = null, isRecording = false;

function setupVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('micBtn');
  if (!SR) {
    micBtn.style.opacity = '0.3';
    micBtn.style.cursor = 'not-allowed';
    micBtn.onclick = () => {
      document.getElementById('voiceStatus').textContent = 'Voz disponível no Chrome e Safari.';
      setTimeout(() => document.getElementById('voiceStatus').textContent = '', 3000);
    };
    return;
  }
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    document.getElementById('voiceStatus').textContent = '🎙 Ouvindo... fale agora';
  };
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    const inp = document.getElementById('userInput');
    inp.value = t; autoResize(inp);
    if (e.results[e.results.length - 1].isFinal)
      document.getElementById('voiceStatus').textContent = 'Pronto — revise e envie';
  };
  recognition.onerror = (e) => {
    stopRecording();
    document.getElementById('voiceStatus').textContent =
      e.error === 'not-allowed' ? 'Permita o acesso ao microfone.' : 'Erro no reconhecimento. Tente novamente.';
    setTimeout(() => document.getElementById('voiceStatus').textContent = '', 4000);
  };
  recognition.onend = () => stopRecording();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  if (document.getElementById('voiceStatus').textContent.includes('Ouvindo'))
    document.getElementById('voiceStatus').textContent = '';
}

function toggleVoice() {
  if (!recognition) return;
  if (isRecording) { recognition.stop(); }
  else { document.getElementById('userInput').value = ''; recognition.start(); }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTopic = btn.dataset.topic;
      updateStartBtn();
    });
  });
  document.getElementById('apiKey').addEventListener('input', updateStartBtn);
  setupVoice();
});

function updateStartBtn() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('startBtn').disabled = !(key && selectedTopic);
}

function startChat() {
  apiKey = document.getElementById('apiKey').value.trim();
  userName = document.getElementById('userName').value.trim() || 'você';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  const topic = TOPICS[selectedTopic];
  const badge = document.getElementById('headerBadge');
  badge.textContent = topic.label; badge.className = 'topic-badge ' + topic.class;

  const n = userName !== 'você' ? `, <strong>${userName}</strong>` : '';
  document.getElementById('welcomeArea').innerHTML = `
    <div class="welcome-msg">
      Olá${n}. Este é um espaço só seu.<br>
      Não há respostas certas — só perguntas que abrem caminhos.<br>
      Escreva ou use o microfone para começar.
    </div>`;

  const pillsEl = document.getElementById('topicPills');
  pillsEl.innerHTML = '';
  topic.starters.forEach(s => {
    const p = document.createElement('button');
    p.className = 'topic-pill ' + topic.pillClass;
    p.textContent = s; p.onclick = () => quickStart(s);
    pillsEl.appendChild(p);
  });
  conversationHistory = [];
}

function quickStart(text) {
  document.getElementById('topicPills').style.display = 'none';
  document.getElementById('welcomeArea').style.display = 'none';
  document.getElementById('userInput').value = text;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addMessage(role, text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ' + role;
  const av = document.createElement('div'); av.className = 'avatar ' + role;
  av.textContent = role === 'ai' ? 'E' : (userName !== 'você' ? userName[0].toUpperCase() : 'V');
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  div.appendChild(av); div.appendChild(bubble);
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function addTyping() {
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing-indicator';
  const av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'E';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(av); div.appendChild(bubble); el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

async function sendMessage() {
  if (isLoading) return;
  if (isRecording && recognition) recognition.stop();
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('topicPills').style.display = 'none';
  document.getElementById('welcomeArea').style.display = 'none';
  document.getElementById('voiceStatus').textContent = '';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;
  addTyping();

  try {
    const topic = TOPICS[selectedTopic];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5-20250929',
        max_tokens: 400,
        system: topic.system + (userName !== 'você' ? `\n\nO nome da pessoa é ${userName}.` : ''),
        messages: conversationHistory
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      addMessage('ai', 'Erro: ' + (data.error.message || 'Chave inválida ou limite atingido.'));
    } else {
      const reply = data.content?.[0]?.text || '...';
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    }
  } catch {
    removeTyping();
    addMessage('ai', 'Não foi possível conectar. Verifique sua chave e conexão.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function resetChat() {
  document.getElementById('chat').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('messages').innerHTML =
    '<div class="center-messages"><div id="welcomeArea"></div><div class="topic-pills" id="topicPills"></div></div>';
  conversationHistory = []; selectedTopic = null;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  updateStartBtn();
}
</script>
</body>
</html>
