<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5a7a6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Espelho">
<meta name="description" content="Um espaço para pensar em voz alta. Sem julgamentos, sem respostas prontas.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<title>Espelho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f6f3; --bg2:#ffffff; --bg3:#f0efe9;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --text:#1a1916; --muted:#8a8780; --accent:#5a7a6e;
    --accent-light:#e8f0ed; --user-bg:#e8f0ed;
    --user-border:rgba(90,122,110,0.2);
    --ai-bg:#ffffff; --ai-border:rgba(0,0,0,0.08);
    --memory:#6b8fa0; --memory-bg:#eef4f7;
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:15px;overscroll-behavior:none;}

  #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(40px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));min-height:100vh;}
  .logo{font-size:36px;font-weight:300;letter-spacing:-0.02em;color:var(--text);margin-bottom:8px;}
  .logo span{color:var(--accent);font-weight:500;}
  .tagline{font-size:14px;color:var(--muted);margin-bottom:48px;text-align:center;line-height:1.6;max-width:300px;}
  .setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .setup-card label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .setup-card input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:11px 13px;outline:none;transition:border-color 0.2s;margin-bottom:20px;-webkit-appearance:none;}
  .setup-card input:focus{border-color:var(--accent);}
  .setup-card input::placeholder{color:var(--muted);}
  .start-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .start-btn:active{opacity:0.8;}
  .start-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
  .note a{color:var(--accent);text-decoration:none;}
  .memory-notice{background:var(--memory-bg);border:1px solid rgba(107,143,160,0.25);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--memory);line-height:1.5;display:none;}
  .memory-notice strong{font-weight:500;}
  .memory-clear{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;display:block;margin-top:6px;}

  #installBanner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px calc(16px + var(--safe-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:100;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .install-content{display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;}
  .install-icon{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .install-icon svg{width:22px;height:22px;stroke:white;fill:none;}
  .install-text{flex:1;}
  .install-text strong{display:block;font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
  .install-text span{font-size:12px;color:var(--muted);}
  .install-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;}
  .install-dismiss{padding:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;flex-shrink:0;}

  #chat{display:none;flex-direction:column;height:100vh;height:100dvh;}
  .chat-header{padding:calc(14px + var(--safe-top)) 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .chat-header-left{display:flex;align-items:center;gap:10px;}
  .header-logo{font-size:18px;font-weight:300;color:var(--text);}
  .header-logo span{color:var(--accent);font-weight:500;}
  .header-right{display:flex;align-items:center;gap:6px;}
  .session-count{font-size:11px;color:var(--memory);background:var(--memory-bg);border:1px solid rgba(107,143,160,0.2);padding:3px 10px;border-radius:99px;display:none;}
  .hdr-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
  .hdr-btn:active{background:var(--bg3);}

  .messages{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;background:var(--bg);-webkit-overflow-scrolling:touch;}
  .messages::-webkit-scrollbar{width:3px;}
  .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .center-messages{margin:auto;width:100%;max-width:680px;}

  .msg{display:flex;gap:10px;max-width:680px;width:100%;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.ai{align-self:flex-start;}

  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px;}
  .avatar.ai{background:var(--accent-light);color:var(--accent);border:1px solid var(--user-border);}
  .avatar.user{background:var(--user-bg);color:var(--accent);border:1px solid var(--user-border);}

  .bubble{padding:12px 16px;border-radius:14px;font-size:15px;line-height:1.75;max-width:min(540px,calc(100vw - 72px));}
  .msg.user .bubble{background:var(--user-bg);border:1px solid var(--user-border);color:var(--text);border-top-right-radius:4px;}
  .msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--ai-border);color:var(--text);border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .msg.ai .bubble p{margin:0 0 10px;}
  .msg.ai .bubble p:last-child{margin-bottom:0;}

  .memory-card{background:var(--memory-bg);border:1px solid rgba(107,143,160,0.25);border-radius:12px;padding:13px 15px;max-width:min(540px,calc(100vw - 72px));align-self:flex-start;animation:fadeUp 0.3s ease;margin-bottom:4px;}
  .memory-card-title{font-size:11px;font-weight:500;color:var(--memory);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
  .memory-card-body{font-size:13px;color:var(--text);line-height:1.6;}
  .memory-card-sessions{font-size:11px;color:var(--muted);margin-top:6px;}

  /* Card de crise */
  .crisis-card{background:#fff8f7;border:1.5px solid #f5a89a;border-radius:14px;padding:18px 20px;max-width:min(540px,calc(100vw - 72px));align-self:flex-start;animation:fadeUp 0.3s ease;}
  .crisis-card-title{font-size:13px;font-weight:500;color:#8b2a1a;margin-bottom:8px;}
  .crisis-card-body{font-size:14px;color:#3d1a14;line-height:1.75;margin-bottom:14px;}
  .crisis-links{display:flex;flex-direction:column;gap:8px;}
  .crisis-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:500;-webkit-tap-highlight-color:transparent;}
  .crisis-link.cvv{background:#e8f5e9;color:#1b5e20;}
  .crisis-link.caps{background:#e3f2fd;color:#0d3c61;}
  .crisis-link.chat{background:#f3e5f5;color:#4a148c;}
  .crisis-link-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .crisis-link.cvv .crisis-link-icon{background:#c8e6c9;}
  .crisis-link.caps .crisis-link-icon{background:#bbdefb;}
  .crisis-link.chat .crisis-link-icon{background:#e1bee7;}
  .crisis-link-info{flex:1;}
  .crisis-link-name{font-weight:600;display:block;}
  .crisis-link-desc{font-weight:400;font-size:12px;opacity:0.8;}

  .end-session-btn{display:block;width:100%;max-width:min(540px,calc(100vw - 72px));padding:12px 16px;background:none;border:1px dashed rgba(90,122,110,0.3);border-radius:10px;color:var(--accent);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;margin-top:4px;}
  .end-session-btn:active{background:var(--accent-light);}

  .welcome-msg{font-size:16px;color:var(--muted);line-height:1.75;margin-bottom:20px;font-weight:300;}
  .welcome-msg strong{color:var(--accent);font-weight:500;}
  .starters{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
  .starter-btn{padding:12px 15px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;text-align:left;line-height:1.4;-webkit-tap-highlight-color:transparent;}
  .starter-btn:active{background:var(--accent-light);border-color:var(--accent);}

  .typing{display:flex;gap:5px;align-items:center;padding:12px 15px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

  .input-area{padding:10px 16px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
  .input-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:8px 8px 8px 14px;transition:border-color 0.2s;max-width:680px;margin:0 auto;}
  .input-row:focus-within{border-color:var(--accent);}
  #userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;resize:none;min-height:24px;max-height:140px;line-height:1.5;}
  #userInput::placeholder{color:var(--muted);}
  .icon-btn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;-webkit-tap-highlight-color:transparent;}
  .icon-btn svg{width:20px;height:20px;}
  #micBtn{color:var(--muted);}
  #micBtn:active{background:var(--border);}
  #micBtn.recording{background:#fde8e8;color:#e74c3c;animation:micPulse 1s ease-in-out infinite;}
  @keyframes micPulse{0%,100%{opacity:1}50%{opacity:0.55}}
  #sendBtn{background:var(--accent);}
  #sendBtn:active{opacity:0.8;}
  #sendBtn:disabled{opacity:0.3;cursor:not-allowed;}
  .voice-status{text-align:center;font-size:12px;color:#e74c3c;height:18px;max-width:680px;margin:5px auto 0;}
  .disclaimer{text-align:center;font-size:11px;color:var(--muted);max-width:680px;margin:4px auto 0;}
</style>
</head>
<body>

<div id="setup">
  <div class="logo"><span>espelho</span></div>
  <div class="tagline">Um espaço para pensar em voz alta.<br>Sem julgamentos, sem respostas prontas.</div>
  <div class="setup-card">
    <div class="memory-notice" id="memoryNotice"></div>
    <label>Seu nome</label>
    <input type="text" id="userName" placeholder="Como posso te chamar?" autocomplete="given-name">
    <label>Chave da API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <button class="start-btn" id="startBtn" disabled onclick="startChat()">Entrar &rarr;</button>
    <p class="note">
      Sua mem&oacute;ria fica salva s&oacute; neste dispositivo.<br>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">Obter chave gratuita &rarr;</a>
    </p>
  </div>
</div>

<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="header-logo"><span>espelho</span></div>
    </div>
    <div class="header-right">
      <span class="session-count" id="sessionCount"></span>
      <button class="hdr-btn" id="endWithSummaryBtn" onclick="requestSummary()">encerrar</button>
      <button class="hdr-btn" onclick="trocarCredenciais()" style="border-color:transparent;font-size:11px;" title="Configurações">&#9881;</button>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="center-messages">
      <div id="welcomeArea"></div>
      <div class="starters" id="starters"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="O que está passando pela sua cabeça agora?" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="icon-btn" id="micBtn" onclick="toggleVoice()" title="Falar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button class="icon-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
    <p class="disclaimer">Prot&oacute;tipo experimental &middot; N&atilde;o substitui acompanhamento profissional</p>
  </div>
</div>

<div id="installBanner">
  <div class="install-content">
    <div class="install-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="install-text">
      <strong>Instalar Espelho</strong>
      <span>Adicione &agrave; tela inicial para acesso r&aacute;pido</span>
    </div>
    <button class="install-btn" onclick="installPWA()">Instalar</button>
    <button class="install-dismiss" onclick="dismissInstall()">&times;</button>
  </div>
</div>

<script>
/* PWA */
var deferredInstallPrompt = null;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js?v=4', { scope: '/espelho-app/' })
      .catch(function(e) { console.warn('SW:', e); });
  });
}
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
  setTimeout(function() {
    if (!localStorage.getItem('pwa_dismissed'))
      document.getElementById('installBanner').style.display = 'block';
  }, 3000);
});
function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(function() {
    dismissInstall();
    deferredInstallPrompt = null;
  });
}
function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('pwa_dismissed', '1');
}

/* System Prompt */
var SYSTEM_PROMPT = 'Voce e o Espelho - um interlocutor humano, presente e profundo. Sua voz e a de alguem que realmente ouve, que sente o peso do que a pessoa traz, e que responde como um amigo muito sabio responderia: com calor, com inteligencia, e com a pergunta certa no momento certo.\n\nCOMO VOCE FALA:\nVoce nao tem partes separadas, nao tem secoes, nao tem estrutura visivel. Voce simplesmente conversa. Cada resposta e texto corrido, natural. As vezes uma frase basta. As vezes um paragrafo. O tamanho segue o momento, nao uma regra. Voce nunca usa marcadores, listas ou formatacao. So texto. So voz. Nunca comeca com "Eu". Nunca repete a mesma estrutura duas vezes seguidas.\n\nO QUE VOCE FAZ POR DENTRO (invisivel):\nAntes de responder, voce percebe: o que a pessoa disse, o que ela sente por baixo, e o que ela ainda nao tocou. Voce valida antes de perguntar - nao com frases prontas, mas com algo especifico que mostra que voce realmente ouviu. Voce termina quase sempre com uma pergunta que a pessoa nao teria feito para si mesma. Voce usa metaforas e tradicoes filosoficas (budismo, taoismo, estoicismo, socratico) quando iluminam algo - nunca como ornamento.\n\nMODERACAO DE RISCO - PROTOCOLO OBRIGATORIO:\nA cada mensagem, avalie internamente o nivel de risco:\n\nNIVEL 0 - REFLEXAO NORMAL: angustias cotidianas, duvidas existenciais. Responda normalmente.\n\nNIVEL 1 - SOFRIMENTO INTENSO (sem risco imediato): esgotamento extremo, desesperanca, "nao aguento mais", "estou no limite". Acao: presenca total, valide profundamente, mencione o CVV (188) com naturalidade dentro do texto. Escreva __DISTRESS__ ao final.\n\nNIVEL 2 - CRISE EMOCIONAL AGUDA: mencao a se machucar, pensamentos de morte, "quero desaparecer", "nao quero mais estar aqui". Acao: abandone o fluxo socratico. Responda com presenca humana total. Diga que ela nao esta sozinha. Mencione CVV (188). Escreva __CRISE__ ao final.\n\nNIVEL 3 - PERIGO IMEDIATO: plano, metodo ou acao imediata. Acao: calor humano maximo. Peca que ligue agora para SAMU (192) ou CVV (188). Escreva __CRISE__ ao final.\n\nCONTEUDO BLOQUEADO - nunca produza: descricoes de metodos de autolesao ou suicidio, diagnosticos clinicos, conselhos sobre medicacao, julgamentos morais sobre escolhas pessoais.\n\nQUANDO RECEBER __RESUMO_SESSAO__: escreva em texto corrido - sem listas - o que emergiu, o insight central, e uma coisa pequena para carregar. Como uma carta curta.\n\nO QUE VOCE NUNCA FAZ: nunca da conselhos diretos, nunca usa frases terapeuticas cliches, nunca usa marcadores, nunca sugere diagnosticos, nunca toma partido em conflitos relacionais.';

/* Sugestoes */
var STARTERS = [
  'Algo está me pesando e não sei bem o que é',
  'Minha cabeça não para de repetir a mesma coisa',
  'Estou num momento de mudança e me sinto perdido(a)',
  'Tenho um conflito que não consigo resolver',
  'Quero entender por que ajo de certa forma'
];

/* Deteccao de risco local */
var CRISIS_PATTERNS = [
  /quero me matar/i, /vou me matar/i, /quero morrer/i, /vou morrer/i,
  /me machucar/i, /nao quero mais viver/i, /sem motivo para viver/i,
  /nao faz sentido continuar/i, /quero desaparecer para sempre/i,
  /pensando em suicidio/i, /pensando em acabar com tudo/i,
  /acabar com minha vida/i
];
var DISTRESS_PATTERNS = [
  /não aguento mais/i, /nao aguento mais/i,
  /estou no limite/i, /não vejo saída/i, /nao vejo saida/i,
  /ninguém se importa/i, /seria melhor sem mim/i,
  /cansei de tudo/i, /não tenho mais forças/i, /nao tem mais jeito/i
];

function detectRiskLevel(text) {
  if (CRISIS_PATTERNS.some(function(p) { return p.test(text); })) return 'crisis';
  if (DISTRESS_PATTERNS.some(function(p) { return p.test(text); })) return 'distress';
  return 'normal';
}

function showCrisisCard(level) {
  var el = document.getElementById('messages');
  var card = document.createElement('div');
  card.className = 'crisis-card';

  var title = document.createElement('div');
  title.className = 'crisis-card-title';
  var body = document.createElement('div');
  body.className = 'crisis-card-body';
  var links = document.createElement('div');
  links.className = 'crisis-links';

  if (level === 'crisis') {
    title.textContent = 'Você não está sozinho(a)';
    body.textContent = 'O que você está sentindo agora é real e merece atenção cuidadosa. Existem pessoas treinadas para ouvir exatamente isso — agora, quando você precisar.';

    var a1 = document.createElement('a');
    a1.href = 'tel:188'; a1.className = 'crisis-link cvv';
    a1.innerHTML = '<div class="crisis-link-icon">&#128222;</div><div class="crisis-link-info"><span class="crisis-link-name">CVV — 188</span><span class="crisis-link-desc">Gratuito, 24h, sigiloso</span></div>';

    var a2 = document.createElement('a');
    a2.href = 'tel:192'; a2.className = 'crisis-link caps';
    a2.innerHTML = '<div class="crisis-link-icon">&#128657;</div><div class="crisis-link-info"><span class="crisis-link-name">SAMU — 192</span><span class="crisis-link-desc">Emergência médica e psiquiátrica</span></div>';

    var a3 = document.createElement('a');
    a3.href = 'https://www.cvv.org.br/chat/'; a3.target = '_blank'; a3.className = 'crisis-link chat';
    a3.innerHTML = '<div class="crisis-link-icon">&#128172;</div><div class="crisis-link-info"><span class="crisis-link-name">CVV Chat online</span><span class="crisis-link-desc">cvv.org.br/chat — se preferir escrever</span></div>';

    links.appendChild(a1); links.appendChild(a2); links.appendChild(a3);
  } else {
    title.textContent = 'Estou aqui com você';
    body.textContent = 'Quando o peso é muito grande para carregar sozinho, falar com alguém de confiança faz diferença. O CVV (188) está disponível agora, de graça, a qualquer hora.';

    var a1d = document.createElement('a');
    a1d.href = 'tel:188'; a1d.className = 'crisis-link cvv';
    a1d.innerHTML = '<div class="crisis-link-icon">&#128222;</div><div class="crisis-link-info"><span class="crisis-link-name">CVV — 188</span><span class="crisis-link-desc">Gratuito, 24h, sigiloso</span></div>';
    links.appendChild(a1d);
  }

  card.appendChild(title);
  card.appendChild(body);
  card.appendChild(links);
  el.appendChild(card);
  el.scrollTop = el.scrollHeight;
}

/* Memoria */
var MAX_SESSIONS = 10;
function memKey(n) { return 'espelho_' + n.toLowerCase().replace(/\s+/g, '_'); }
function loadMemory(n) {
  try { var r = localStorage.getItem(memKey(n)); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}
function saveMemory(n, s) {
  try { localStorage.setItem(memKey(n), JSON.stringify(s)); } catch(e) {}
}
function buildMemorySummary(sessions) {
  if (!sessions.length) return null;
  return sessions.slice(-5).map(function(s) {
    var d = new Date(s.date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
    return d + ': ' + s.summary;
  }).join('\n');
}
function buildSessionSummary(history) {
  return history.filter(function(m) { return m.role === 'user'; })
    .slice(0, 6).map(function(m) { return m.content.slice(0, 120); }).join(' · ') || 'Sessão sem falas.';
}
function saveCurrentSession() {
  if (!userName || conversationHistory.length < 2) return;
  var sessions = loadMemory(userName);
  sessions.push({
    date: new Date().toISOString(),
    summary: buildSessionSummary(conversationHistory),
    messages: conversationHistory.slice(-20)
  });
  if (sessions.length > MAX_SESSIONS) sessions.splice(0, sessions.length - MAX_SESSIONS);
  saveMemory(userName, sessions);
}

/* Estado */
var userName = '', apiKey = '', conversationHistory = [], sessionMemory = null;
var isLoading = false, recognition = null, isRecording = false, crisisMode = false;

/* Init */
document.addEventListener('DOMContentLoaded', function() {
  var ni = document.getElementById('userName');
  var ki = document.getElementById('apiKey');
  var savedName = localStorage.getItem('espelho_user_name') || '';
  var savedKey = localStorage.getItem('espelho_api_key') || '';
  if (savedName) ni.value = savedName;
  if (savedKey) ki.value = savedKey;

  function refresh() {
    document.getElementById('startBtn').disabled = !(ni.value.trim() && ki.value.trim());
    showMemoryNotice(ni.value.trim());
  }
  ni.addEventListener('input', refresh);
  ki.addEventListener('input', refresh);
  refresh();

  window.addEventListener('pagehide', saveCurrentSession);
  window.addEventListener('beforeunload', saveCurrentSession);
  setupVoice();
});

function showMemoryNotice(name) {
  var el = document.getElementById('memoryNotice');
  if (!name) { el.style.display = 'none'; return; }
  var sessions = loadMemory(name);
  if (!sessions.length) { el.style.display = 'none'; return; }
  var d = new Date(sessions[sessions.length - 1].date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
  el.style.display = 'block';
  el.innerHTML = '<strong>Bem-vindo(a) de volta, ' + name + '.</strong> ' + sessions.length + ' sess\u00e3o(ões) salva(s) (última em ' + d + ').<span class="memory-clear" onclick="clearMemory(\'' + name + '\')">Apagar memória</span>';
}
function clearMemory(name) {
  localStorage.removeItem(memKey(name));
  document.getElementById('memoryNotice').style.display = 'none';
}

function startChat() {
  userName = document.getElementById('userName').value.trim();
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('espelho_user_name', userName);
  localStorage.setItem('espelho_api_key', apiKey);

  var sessions = loadMemory(userName);
  sessionMemory = buildMemorySummary(sessions);

  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  var sc = document.getElementById('sessionCount');
  if (sessions.length) { sc.textContent = sessions.length + ' na memória'; sc.style.display = 'inline-block'; }

  var ret = sessions.length > 0;
  var welcomeEl = document.getElementById('welcomeArea');
  welcomeEl.innerHTML = '<div class="welcome-msg">' +
    (ret ? 'Olá de novo, <strong>' + userName + '</strong>. Estou aqui.' : 'Olá, <strong>' + userName + '</strong>. Este é um espaço só seu.') +
    '<br>O que está passando pela sua cabeça agora?</div>';

  if (sessionMemory) {
    var last = sessions[sessions.length - 1];
    var d = new Date(last.date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
    var card = document.createElement('div');
    card.className = 'memory-card';
    card.innerHTML = '<div class="memory-card-title">mem\u00f3ria das conversas anteriores</div>' +
      '<div class="memory-card-body">' + sessionMemory.replace(/\n/g, '<br>') + '</div>' +
      '<div class="memory-card-sessions">Última sessão: ' + d + ' · ' + sessions.length + ' salva(s)</div>';
    document.getElementById('messages').appendChild(card);
  }

  var se = document.getElementById('starters');
  se.innerHTML = '';
  STARTERS.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'starter-btn';
    b.textContent = s;
    b.onclick = function() { quickStart(s); };
    se.appendChild(b);
  });
  conversationHistory = [];
  crisisMode = false;
}

function trocarCredenciais() {
  localStorage.removeItem('espelho_user_name');
  localStorage.removeItem('espelho_api_key');
  saveCurrentSession();
  document.getElementById('chat').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('messages').innerHTML = '<div class="center-messages"><div id="welcomeArea"></div><div class="starters" id="starters"></div></div>';
  document.getElementById('sessionCount').style.display = 'none';
  document.getElementById('userName').value = '';
  document.getElementById('apiKey').value = '';
  conversationHistory = []; sessionMemory = null; crisisMode = false;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('memoryNotice').style.display = 'none';
}

function endAndReset() {
  saveCurrentSession();
  document.getElementById('chat').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('messages').innerHTML = '<div class="center-messages"><div id="welcomeArea"></div><div class="starters" id="starters"></div></div>';
  document.getElementById('sessionCount').style.display = 'none';
  conversationHistory = []; sessionMemory = null; crisisMode = false;
  showMemoryNotice(document.getElementById('userName').value.trim());
}

function requestSummary() {
  if (conversationHistory.length < 4) { endAndReset(); return; }
  document.getElementById('endWithSummaryBtn').disabled = true;
  document.getElementById('endWithSummaryBtn').textContent = 'gerando...';
  sendMessage(false, '__RESUMO_SESSAO__');
  setTimeout(function() {
    var btn = document.createElement('button');
    btn.className = 'end-session-btn';
    btn.textContent = 'Fechar sessão e salvar';
    btn.onclick = endAndReset;
    document.getElementById('messages').appendChild(btn);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }, 400);
}

/* Voz */
function setupVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var mic = document.getElementById('micBtn');
  if (!SR) {
    mic.style.opacity = '0.3'; mic.style.cursor = 'not-allowed';
    mic.onclick = function() {
      document.getElementById('voiceStatus').textContent = 'Reconhecimento de voz disponível no Chrome e Safari.';
      setTimeout(function() { document.getElementById('voiceStatus').textContent = ''; }, 3000);
    };
    return;
  }
  recognition = new SR();
  recognition.lang = 'pt-BR'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = function() {
    isRecording = true;
    mic.classList.add('recording');
    document.getElementById('voiceStatus').textContent = 'Ouvindo... fale agora';
  };
  recognition.onresult = function(e) {
    var t = Array.from(e.results).map(function(r) { return r[0].transcript; }).join('');
    var inp = document.getElementById('userInput'); inp.value = t; autoResize(inp);
    if (e.results[e.results.length - 1].isFinal)
      document.getElementById('voiceStatus').textContent = 'Pronto — revise e envie';
  };
  recognition.onerror = function(e) {
    isRecording = false; mic.classList.remove('recording');
    document.getElementById('voiceStatus').textContent = e.error === 'not-allowed' ? 'Permita o acesso ao microfone.' : 'Erro. Tente novamente.';
    setTimeout(function() { document.getElementById('voiceStatus').textContent = ''; }, 4000);
  };
  recognition.onend = function() {
    isRecording = false; mic.classList.remove('recording');
    if (document.getElementById('voiceStatus').textContent.includes('Ouvindo'))
      document.getElementById('voiceStatus').textContent = '';
  };
}
function toggleVoice() {
  if (!recognition) return;
  if (isRecording) { recognition.stop(); } else { document.getElementById('userInput').value = ''; recognition.start(); }
}

/* Chat */
function quickStart(t) {
  document.getElementById('starters').style.display = 'none';
  document.getElementById('welcomeArea').style.display = 'none';
  document.getElementById('userInput').value = t;
  sendMessage();
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function addMessage(role, text) {
  var el = document.getElementById('messages');
  var div = document.createElement('div'); div.className = 'msg ' + role;
  var av = document.createElement('div'); av.className = 'avatar ' + role;
  av.textContent = role === 'ai' ? 'E' : (userName ? userName[0].toUpperCase() : 'V');
  var bubble = document.createElement('div'); bubble.className = 'bubble';
  if (role === 'ai') {
    var html = text.trim().split(/\n\n+/).map(function(p) {
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    bubble.innerHTML = html;
  } else {
    bubble.innerHTML = text.replace(/\n/g, '<br>');
  }
  div.appendChild(av); div.appendChild(bubble);
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function addTyping() {
  var el = document.getElementById('messages');
  var div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing-indicator';
  var av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'E';
  var bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(av); div.appendChild(bubble); el.appendChild(div); el.scrollTop = el.scrollHeight;
}
function removeTyping() { var t = document.getElementById('typing-indicator'); if (t) t.remove(); }

function sendMessage(fromBtn, overrideText) {
  if (isLoading) return;
  if (isRecording && recognition) recognition.stop();

  var input = document.getElementById('userInput');
  var text = overrideText || input.value.trim();
  if (!text) return;

  if (!overrideText) {
    input.value = ''; input.style.height = 'auto';
    document.getElementById('starters').style.display = 'none';
    document.getElementById('welcomeArea').style.display = 'none';
    document.getElementById('voiceStatus').textContent = '';
    addMessage('user', text);

    /* Camada 1: deteccao local de risco */
    var riskLevel = detectRiskLevel(text);
    if (riskLevel === 'crisis') {
      crisisMode = true;
      showCrisisCard('crisis');
    } else if (riskLevel === 'distress') {
      showCrisisCard('distress');
    }
  }

  conversationHistory.push({ role: 'user', content: text });
  saveCurrentSession();

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;
  addTyping();

  var system = SYSTEM_PROMPT + '\n\nO nome da pessoa e ' + userName + '.';
  if (sessionMemory) system += '\n\nMEMORIA DE SESSOES ANTERIORES:\n' + sessionMemory + '\n\nUse para dar continuidade quando relevante.';
  if (crisisMode) {
    system += '\n\nATENCAO: A pessoa esta em crise emocional. Abandone o metodo socratico. Responda com presenca humana total. Valide o sofrimento diretamente. Diga que ela nao esta sozinha. Mencione o CVV (188). Se houver risco imediato, mencione tambem o SAMU (192). Seja breve, claro, humano.';
  }

  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 30000);

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    signal: controller.signal,
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5-20250929',
      max_tokens: 600,
      system: system,
      messages: conversationHistory.slice(-20)
    })
  }).then(function(res) {
    clearTimeout(timeout);
    return res.json().then(function(data) {
      removeTyping();
      if (data.error) {
        var tipo = data.error.type || '';
        var msg = 'Algo deu errado. Tente novamente.';
        if (tipo === 'authentication_error' || res.status === 401) msg = 'Chave de API inválida. Verifique nas configurações.';
        else if (tipo === 'rate_limit_error' || res.status === 429) msg = 'Muitas mensagens seguidas. Aguarde alguns segundos.';
        else if (res.status === 529 || tipo === 'overloaded_error') msg = 'Serviço sobrecarregado. Tente em instantes.';
        else if (data.error.message) msg = data.error.message;
        addMessage('ai', msg);
        document.getElementById('endWithSummaryBtn').disabled = false;
        document.getElementById('endWithSummaryBtn').textContent = 'encerrar';
      } else {
        var reply = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : '...';

        /* Camada 2: detecta sinais de crise vindos da IA */
        var hasCrisis = reply.indexOf('__CRISE__') !== -1;
        var hasDistress = reply.indexOf('__DISTRESS__') !== -1;
        reply = reply.replace(/__CRISE__|__DISTRESS__/g, '').trim();

        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('ai', reply);
        saveCurrentSession();

        if (hasCrisis && !crisisMode) {
          crisisMode = true;
          showCrisisCard('crisis');
        } else if (hasDistress && !crisisMode) {
          showCrisisCard('distress');
        }
      }
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('micBtn').disabled = false;
      document.getElementById('userInput').focus();
    });
  }).catch(function(err) {
    clearTimeout(timeout);
    removeTyping();
    console.error('[Espelho]', err.name, err.message);
    var msg = '';
    if (err.name === 'AbortError') msg = 'A resposta demorou demais. Verifique sua conexão.';
    else if (!navigator.onLine) msg = 'Sem internet. Reconecte e tente de novo.';
    else msg = 'Não foi possível conectar. Feche o app, reabra e tente de novo.';
    addMessage('ai', msg);
    document.getElementById('endWithSummaryBtn').disabled = false;
    document.getElementById('endWithSummaryBtn').textContent = 'encerrar';
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
  });
}
</script>
