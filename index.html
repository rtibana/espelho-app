<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5a7a6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Espelho">
<meta name="description" content="Um espaço para pensar em voz alta. Sem julgamentos, sem respostas prontas.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<title>Espelho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f6f3; --bg2:#ffffff; --bg3:#f0efe9;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --text:#1a1916; --muted:#8a8780; --accent:#5a7a6e;
    --accent-light:#e8f0ed; --user-bg:#e8f0ed;
    --user-border:rgba(90,122,110,0.2);
    --ai-bg:#ffffff; --ai-border:rgba(0,0,0,0.08);
    --recording:#e74c3c; --memory:#6b8fa0; --memory-bg:#eef4f7;
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:15px;overscroll-behavior:none;}

  #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(40px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));min-height:100vh;}
  .logo{font-size:36px;font-weight:300;letter-spacing:-0.02em;color:var(--text);margin-bottom:8px;}
  .logo span{color:var(--accent);font-weight:500;}
  .tagline{font-size:14px;color:var(--muted);margin-bottom:48px;text-align:center;line-height:1.6;max-width:300px;}
  .setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .setup-card label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .setup-card input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:11px 13px;outline:none;transition:border-color 0.2s;margin-bottom:20px;-webkit-appearance:none;}
  .setup-card input:focus{border-color:var(--accent);}
  .setup-card input::placeholder{color:var(--muted);}
  .start-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .start-btn:active{opacity:0.8;}
  .start-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
  .note a{color:var(--accent);text-decoration:none;}

  .memory-notice{background:var(--memory-bg);border:1px solid rgba(107,143,160,0.25);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--memory);line-height:1.5;display:none;}
  .memory-notice strong{font-weight:500;}
  .memory-clear{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;display:block;margin-top:6px;}

  #installBanner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px calc(16px + var(--safe-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:100;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .install-content{display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;}
  .install-icon{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .install-icon svg{width:22px;height:22px;stroke:white;fill:none;}
  .install-text{flex:1;}
  .install-text strong{display:block;font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
  .install-text span{font-size:12px;color:var(--muted);}
  .install-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;}
  .install-dismiss{padding:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;flex-shrink:0;}

  #chat{display:none;flex-direction:column;height:100vh;height:100dvh;}
  .chat-header{padding:calc(14px + var(--safe-top)) 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .chat-header-left{display:flex;align-items:center;gap:10px;}
  .header-logo{font-size:18px;font-weight:300;color:var(--text);}
  .header-logo span{color:var(--accent);font-weight:500;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .session-count{font-size:11px;color:var(--memory);background:var(--memory-bg);border:1px solid rgba(107,143,160,0.2);padding:3px 10px;border-radius:99px;display:none;}
  .reset-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
  .reset-btn:active{background:var(--bg3);}

  .messages{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;background:var(--bg);-webkit-overflow-scrolling:touch;}
  .messages::-webkit-scrollbar{width:3px;}
  .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .center-messages{margin:auto;width:100%;max-width:680px;}

  .msg{display:flex;gap:10px;max-width:680px;width:100%;animation:fadeUp 0.25s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.ai{align-self:flex-start;}

  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
  .avatar.ai{background:var(--accent-light);color:var(--accent);border:1px solid var(--user-border);}
  .avatar.user{background:var(--user-bg);color:var(--accent);border:1px solid var(--user-border);}

  .bubble{padding:11px 15px;border-radius:14px;font-size:15px;line-height:1.65;max-width:min(520px,calc(100vw - 80px));}
  .msg.user .bubble{background:var(--user-bg);border:1px solid var(--user-border);color:var(--text);border-top-right-radius:4px;}
  .msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--ai-border);color:var(--text);border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}

  .memory-card{background:var(--memory-bg);border:1px solid rgba(107,143,160,0.25);border-radius:12px;padding:13px 15px;max-width:min(520px,calc(100vw - 80px));align-self:flex-start;animation:fadeUp 0.25s ease;margin-bottom:4px;}
  .memory-card-title{font-size:11px;font-weight:500;color:var(--memory);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
  .memory-card-body{font-size:13px;color:var(--text);line-height:1.6;}
  .memory-card-sessions{font-size:11px;color:var(--muted);margin-top:6px;}

  .welcome-msg{font-size:16px;color:var(--muted);line-height:1.75;margin-bottom:20px;font-weight:300;}
  .welcome-msg strong{color:var(--accent);font-weight:500;}
  .starters{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
  .starter-btn{padding:12px 15px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;text-align:left;line-height:1.4;-webkit-tap-highlight-color:transparent;}
  .starter-btn:active{background:var(--accent-light);border-color:var(--accent);}

  .typing{display:flex;gap:5px;align-items:center;padding:12px 15px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

  .input-area{padding:10px 16px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
  .input-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:8px 8px 8px 14px;transition:border-color 0.2s;max-width:680px;margin:0 auto;}
  .input-row:focus-within{border-color:var(--accent);}
  #userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;resize:none;min-height:24px;max-height:120px;line-height:1.5;}
  #userInput::placeholder{color:var(--muted);}
  .icon-btn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;-webkit-tap-highlight-color:transparent;}
  .icon-btn svg{width:20px;height:20px;}
  #micBtn{color:var(--muted);}
  #micBtn:active{background:var(--border);}
  #micBtn.recording{background:#fde8e8;color:var(--recording);animation:micPulse 1s ease-in-out infinite;}
  @keyframes micPulse{0%,100%{opacity:1}50%{opacity:0.55}}
  #sendBtn{background:var(--accent);}
  #sendBtn:active{opacity:0.8;}
  #sendBtn:disabled{opacity:0.3;cursor:not-allowed;}

  .voice-status{text-align:center;font-size:12px;color:var(--recording);height:18px;max-width:680px;margin:5px auto 0;}
  .disclaimer{text-align:center;font-size:11px;color:var(--muted);max-width:680px;margin:4px auto 0;}
</style>
</head>
<body>

<div id="setup">
  <div class="logo"><span>espelho</span></div>
  <div class="tagline">Um espaço para pensar em voz alta.<br>Sem julgamentos, sem respostas prontas.</div>
  <div class="setup-card">
    <div class="memory-notice" id="memoryNotice"></div>
    <label>Seu nome</label>
    <input type="text" id="userName" placeholder="Como posso te chamar?" autocomplete="given-name">
    <label>Chave da API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <button class="start-btn" id="startBtn" disabled onclick="startChat()">Entrar →</button>
    <p class="note">
      Sua memória fica salva só neste dispositivo.<br>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">Obter chave gratuita →</a>
    </p>
  </div>
</div>

<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="header-logo"><span>espelho</span></div>
    </div>
    <div class="header-right">
      <span class="session-count" id="sessionCount"></span>
      <button class="reset-btn" onclick="endAndReset()">encerrar</button>
      <button class="reset-btn" onclick="trocarCredenciais()" style="border-color:transparent;color:var(--muted);font-size:11px;" title="Trocar nome ou chave">⚙</button>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="center-messages">
      <div id="welcomeArea"></div>
      <div class="starters" id="starters"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="O que está passando pela sua cabeça agora?" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="icon-btn" id="micBtn" onclick="toggleVoice()" title="Falar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button class="icon-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
    <p class="disclaimer">Protótipo experimental · Não substitui acompanhamento profissional</p>
  </div>
</div>

<div id="installBanner">
  <div class="install-content">
    <div class="install-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="install-text">
      <strong>Instalar Espelho</strong>
      <span>Adicione à tela inicial para acesso rápido</span>
    </div>
    <button class="install-btn" onclick="installPWA()">Instalar</button>
    <button class="install-dismiss" onclick="dismissInstall()">×</button>
  </div>
</div>

<script>
/* ── PWA ── */
let deferredInstallPrompt = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { scope: '/espelho-app/' })
      .then(reg => console.log('SW ok:', reg.scope))
      .catch(err => console.warn('SW erro:', err));
  });
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  setTimeout(() => {
    if (!localStorage.getItem('pwa_dismissed'))
      document.getElementById('installBanner').style.display = 'block';
  }, 3000);
});

function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { dismissInstall(); deferredInstallPrompt = null; });
}
function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('pwa_dismissed', '1');
}

/* ── Sistema ── */
const SYSTEM_PROMPT = `Você é um interlocutor filosófico empático e inteligente, que integra o método socrático ocidental com as tradições de sabedoria oriental — budismo, confucionismo e taoismo. Seu papel é ajudar a pessoa a explorar seus próprios pensamentos, sentimentos e crenças por meio de perguntas cuidadosas — nunca dar conselhos diretos, diagnósticos ou respostas prontas.

MÉTODO CENTRAL:
- Faça sempre UMA pergunta por vez — profunda, gentil, que abra novos ângulos
- Reflita de volta o que a pessoa disse antes de perguntar
- Detecte o tema e o estado emocional, e escolha naturalmente qual tradição filosófica oferece a pergunta mais iluminadora para aquele momento
- Se o tema mudar no meio da conversa, acompanhe sem forçar continuidade
- Respostas curtas: no máximo 3 frases + 1 pergunta
- Nunca minimize, nunca resolva: aprofunde

TRADIÇÕES E QUANDO USÁ-LAS:

Socrático (base sempre presente):
- Provoca contradições e examina crenças subjacentes
- "O que te faz assumir isso como verdade?" / "Você sempre pensou assim?"
- Melhor para: identificar padrões de pensamento, crenças limitantes, autoengano

Budismo (impermanência, sofrimento, desapego):
- Explora a relação da pessoa com o sofrimento e o apego
- "Se isso mudasse amanhã, o que restaria?" / "O que você teme perder de fato?"
- "O que aconteceria se você soltasse isso?" / "O que está acontecendo agora, além dos pensamentos?"
- Melhor para: ansiedade, perda, sofrimento persistente, apego a resultados, medo do futuro

Confucionismo (virtude, relações, dever, harmonia):
- Explora o papel da pessoa em suas relações e sua responsabilidade ética
- "Que tipo de pessoa você quer ser para quem ama?" / "O que sua melhor versão faria?"
- "O que está fora de equilíbrio nessa relação?"
- Melhor para: conflitos relacionais, dilemas éticos, papel na família, identidade social

Taoismo (fluxo, wu wei, equilíbrio, naturalidade):
- Convida a pessoa a observar onde está forçando e onde poderia fluir
- "Onde você está lutando contra o que simplesmente é?" / "Se parasse de empurrar isso, o que aconteceria naturalmente?"
- "Existe algo de valioso no oposto do que você está sentindo?"
- Melhor para: esgotamento, controle excessivo, busca de propósito, transições de vida

REGRAS DE MISTURA:
- Nunca nomeie a tradição filosófica que está usando — a pergunta deve ser natural, não didática
- Misture quando fizer sentido: uma pergunta budista pode abrir espaço para uma socrática na sequência
- A sabedoria oriental não substitui o acolhimento — sempre valide o sentimento antes de provocar
- Se detectar sofrimento intenso, priorize presença e pergunte se a pessoa tem apoio profissional

IMPORTANTE: Nunca sugira diagnósticos. Nunca tome partido em conflitos. Nunca dê listas de dicas. Você faz perguntas, não dá respostas.`;

const STARTERS = [
  'Algo está me pesando e não sei bem o que é',
  'Quero entender melhor como me sinto',
  'Estou num momento de mudança na vida',
  'Tenho um conflito que não consigo resolver',
  'Estou questionando algumas coisas sobre mim',
];

/* ── Memória ── */
const MAX_SESSIONS = 10;
const MEM_KEY = n => `espelho_${n.toLowerCase().replace(/\s+/g,'_')}`;
function loadMemory(n){ try{ const r=localStorage.getItem(MEM_KEY(n)); return r?JSON.parse(r):[]; } catch{ return []; } }
function saveMemory(n,s){ try{ localStorage.setItem(MEM_KEY(n),JSON.stringify(s)); } catch{} }
function buildMemorySummary(sessions){
  if(!sessions.length) return null;
  return sessions.slice(-5).map(s=>{
    const d=new Date(s.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    return `${d}: ${s.summary}`;
  }).join('\n');
}
function buildSessionSummary(history){
  return history.filter(m=>m.role==='user').slice(0,6).map(m=>m.content.slice(0,120)).join(' · ')||'Sessão sem falas.';
}
function saveCurrentSession(){
  if(!userName||conversationHistory.length<2) return;
  const sessions=loadMemory(userName);
  sessions.push({date:new Date().toISOString(),summary:buildSessionSummary(conversationHistory),messages:conversationHistory.slice(-20)});
  if(sessions.length>MAX_SESSIONS) sessions.splice(0,sessions.length-MAX_SESSIONS);
  saveMemory(userName,sessions);
}

/* ── Estado ── */
let userName='', apiKey='', conversationHistory=[], sessionMemory=null;
let isLoading=false, recognition=null, isRecording=false;

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  const ni=document.getElementById('userName'), ki=document.getElementById('apiKey');
  const savedName=localStorage.getItem('espelho_user_name')||'';
  const savedKey=localStorage.getItem('espelho_api_key')||'';
  if(savedName) ni.value=savedName;
  if(savedKey) ki.value=savedKey;
  function refresh(){ document.getElementById('startBtn').disabled=!(ni.value.trim()&&ki.value.trim()); showMemoryNotice(ni.value.trim()); }
  ni.addEventListener('input', refresh);
  ki.addEventListener('input', refresh);
  refresh();
  window.addEventListener('pagehide', saveCurrentSession);
  window.addEventListener('beforeunload', saveCurrentSession);
  setupVoice();
  if(savedName&&savedKey) setTimeout(()=>startChat(), 80);
});

function showMemoryNotice(name){
  const el=document.getElementById('memoryNotice');
  if(!name){ el.style.display='none'; return; }
  const sessions=loadMemory(name);
  if(!sessions.length){ el.style.display='none'; return; }
  const d=new Date(sessions[sessions.length-1].date).toLocaleDateString('pt-BR',{day:'2-digit',month:'long'});
  el.style.display='block';
  el.innerHTML=`<strong>Bem-vindo(a) de volta, ${name}.</strong> ${sessions.length} sessão(ões) salva(s) (última em ${d}).
    <span class="memory-clear" onclick="clearMemory('${name}')">Apagar memória</span>`;
}
function clearMemory(name){ localStorage.removeItem(MEM_KEY(name)); document.getElementById('memoryNotice').style.display='none'; }

function startChat(){
  userName=document.getElementById('userName').value.trim();
  apiKey=document.getElementById('apiKey').value.trim();
  localStorage.setItem('espelho_user_name', userName);
  localStorage.setItem('espelho_api_key', apiKey);
  const sessions=loadMemory(userName);
  sessionMemory=buildMemorySummary(sessions);
  document.getElementById('setup').style.display='none';
  document.getElementById('chat').style.display='flex';
  const sc=document.getElementById('sessionCount');
  if(sessions.length){ sc.textContent=sessions.length+' na memória'; sc.style.display='inline-block'; }
  const ret=sessions.length>0;
  document.getElementById('welcomeArea').innerHTML=`
    <div class="welcome-msg">
      ${ret?`Olá de novo, <strong>${userName}</strong>. Lembro das nossas conversas.`:`Olá, <strong>${userName}</strong>. Este é um espaço só seu.`}<br>
      Fale o que quiser — não há temas certos ou errados.
    </div>`;
  if(sessionMemory){
    const last=sessions[sessions.length-1];
    const d=new Date(last.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'long'});
    const card=document.createElement('div');
    card.className='memory-card';
    card.innerHTML=`<div class="memory-card-title">memória das conversas anteriores</div>
      <div class="memory-card-body">${sessionMemory.replace(/\n/g,'<br>')}</div>
      <div class="memory-card-sessions">Última sessão: ${d} · ${sessions.length} salva(s)</div>`;
    document.getElementById('messages').appendChild(card);
  }
  const se=document.getElementById('starters'); se.innerHTML='';
  STARTERS.forEach(s=>{ const b=document.createElement('button'); b.className='starter-btn'; b.textContent=s; b.onclick=()=>quickStart(s); se.appendChild(b); });
  conversationHistory=[];
}

function trocarCredenciais(){
  localStorage.removeItem('espelho_user_name');
  localStorage.removeItem('espelho_api_key');
  saveCurrentSession();
  document.getElementById('chat').style.display='none';
  document.getElementById('setup').style.display='flex';
  document.getElementById('messages').innerHTML='<div class="center-messages"><div id="welcomeArea"></div><div class="starters" id="starters"></div></div>';
  document.getElementById('sessionCount').style.display='none';
  document.getElementById('userName').value='';
  document.getElementById('apiKey').value='';
  conversationHistory=[]; sessionMemory=null;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('memoryNotice').style.display='none';
}

function endAndReset(){
  saveCurrentSession();
  document.getElementById('chat').style.display='none';
  document.getElementById('setup').style.display='flex';
  document.getElementById('messages').innerHTML='<div class="center-messages"><div id="welcomeArea"></div><div class="starters" id="starters"></div></div>';
  document.getElementById('sessionCount').style.display='none';
  conversationHistory=[]; sessionMemory=null;
  showMemoryNotice(document.getElementById('userName').value.trim());
}

/* ── Voz ── */
function setupVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const mic=document.getElementById('micBtn');
  if(!SR){ mic.style.opacity='0.3'; mic.style.cursor='not-allowed'; mic.onclick=()=>{ document.getElementById('voiceStatus').textContent='Voz disponível no Chrome e Safari.'; setTimeout(()=>document.getElementById('voiceStatus').textContent='',3000); }; return; }
  recognition=new SR(); recognition.lang='pt-BR'; recognition.continuous=false; recognition.interimResults=true;
  recognition.onstart=()=>{ isRecording=true; mic.classList.add('recording'); document.getElementById('voiceStatus').textContent='🎙 Ouvindo... fale agora'; };
  recognition.onresult=(e)=>{ const t=Array.from(e.results).map(r=>r[0].transcript).join(''); const inp=document.getElementById('userInput'); inp.value=t; autoResize(inp); if(e.results[e.results.length-1].isFinal) document.getElementById('voiceStatus').textContent='Pronto — revise e envie'; };
  recognition.onerror=(e)=>{ stopRecording(); document.getElementById('voiceStatus').textContent=e.error==='not-allowed'?'Permita o acesso ao microfone.':'Erro. Tente novamente.'; setTimeout(()=>document.getElementById('voiceStatus').textContent='',4000); };
  recognition.onend=()=>stopRecording();
}
function stopRecording(){ isRecording=false; document.getElementById('micBtn').classList.remove('recording'); if(document.getElementById('voiceStatus').textContent.includes('Ouvindo')) document.getElementById('voiceStatus').textContent=''; }
function toggleVoice(){ if(!recognition) return; if(isRecording){ recognition.stop(); } else { document.getElementById('userInput').value=''; recognition.start(); } }

/* ── Mensagens ── */
function quickStart(t){ document.getElementById('starters').style.display='none'; document.getElementById('welcomeArea').style.display='none'; document.getElementById('userInput').value=t; sendMessage(); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function addMessage(role,text){
  const el=document.getElementById('messages');
  const div=document.createElement('div'); div.className='msg '+role;
  const av=document.createElement('div'); av.className='avatar '+role; av.textContent=role==='ai'?'E':userName[0].toUpperCase();
  const bubble=document.createElement('div'); bubble.className='bubble'; bubble.innerHTML=text.replace(/\n/g,'<br>');
  div.appendChild(av); div.appendChild(bubble); el.appendChild(div); el.scrollTop=el.scrollHeight;
}
function addTyping(){
  const el=document.getElementById('messages');
  const div=document.createElement('div'); div.className='msg ai'; div.id='typing-indicator';
  const av=document.createElement('div'); av.className='avatar ai'; av.textContent='E';
  const bubble=document.createElement('div'); bubble.className='bubble';
  bubble.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(av); div.appendChild(bubble); el.appendChild(div); el.scrollTop=el.scrollHeight;
}
function removeTyping(){ const t=document.getElementById('typing-indicator'); if(t) t.remove(); }

async function sendMessage(){
  if(isLoading) return;
  if(isRecording&&recognition) recognition.stop();
  const input=document.getElementById('userInput');
  const text=input.value.trim(); if(!text) return;
  input.value=''; input.style.height='auto';
  document.getElementById('starters').style.display='none';
  document.getElementById('welcomeArea').style.display='none';
  document.getElementById('voiceStatus').textContent='';
  addMessage('user',text);
  conversationHistory.push({role:'user',content:text});
  saveCurrentSession();
  isLoading=true; document.getElementById('sendBtn').disabled=true; document.getElementById('micBtn').disabled=true;
  addTyping();
  try{
    let system=SYSTEM_PROMPT+`\n\nO nome da pessoa é ${userName}.`;
    if(sessionMemory) system+=`\n\nMEMÓRIA:\n${sessionMemory}\n\nUse quando relevante, sem forçar.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:400,system,messages:conversationHistory})
    });
    const data=await res.json(); removeTyping();
    if(data.error){ addMessage('ai','Erro: '+(data.error.message||'Chave inválida.')); }
    else{ const reply=data.content?.[0]?.text||'...'; conversationHistory.push({role:'assistant',content:reply}); addMessage('ai',reply); saveCurrentSession(); }
  } catch { removeTyping(); addMessage('ai','Não foi possível conectar. Verifique sua chave e conexão.'); }
  isLoading=false; document.getElementById('sendBtn').disabled=false; document.getElementById('micBtn').disabled=false;
  document.getElementById('userInput').focus();
}
</script>
