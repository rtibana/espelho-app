<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5a7a6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Espelho">
<meta name="description" content="Um espaço para pensar em voz alta. Sem julgamentos, sem respostas prontas.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<title>Espelho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f6f3; --bg2:#ffffff; --bg3:#f0efe9;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --text:#1a1916; --muted:#8a8780; --accent:#5a7a6e;
    --accent-light:#e8f0ed; --user-bg:#e8f0ed;
    --user-border:rgba(90,122,110,0.2);
    --ai-bg:#ffffff; --ai-border:rgba(0,0,0,0.08);
    --memory:#6b8fa0; --memory-bg:#eef4f7;
    --quote:#8a6f4e; --quote-bg:#fdf8f2;
    --practice-bg:#f0f7ee; --practice:#3d6b5a;
    --summary-bg:#fdf3e7; --summary:#8a5c2e;
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:15px;overscroll-behavior:none;}

  /* ── Setup ── */
  #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(40px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));min-height:100vh;}
  .logo{font-size:36px;font-weight:300;letter-spacing:-0.02em;color:var(--text);margin-bottom:8px;}
  .logo span{color:var(--accent);font-weight:500;}
  .tagline{font-size:14px;color:var(--muted);margin-bottom:48px;text-align:center;line-height:1.6;max-width:300px;}
  .setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .setup-card label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .setup-card input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:11px 13px;outline:none;transition:border-color 0.2s;margin-bottom:20px;-webkit-appearance:none;}
  .setup-card input:focus{border-color:var(--accent);}
  .setup-card input::placeholder{color:var(--muted);}
  .start-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .start-btn:active{opacity:0.8;}
  .start-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
  .note a{color:var(--accent);text-decoration:none;}
  .memory-notice{background:var(--memory-bg);border:1px solid rgba(107,143,160,0.25);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--memory);line-height:1.5;display:none;}
  .memory-notice strong{font-weight:500;}
  .memory-clear{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;display:block;margin-top:6px;}

  /* ── Install banner ── */
  #installBanner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px calc(16px + var(--safe-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:100;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .install-content{display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;}
  .install-icon{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .install-icon svg{width:22px;height:22px;stroke:white;fill:none;}
  .install-text{flex:1;}
  .install-text strong{display:block;font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
  .install-text span{font-size:12px;color:var(--muted);}
  .install-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;}
  .install-dismiss{padding:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;flex-shrink:0;}

  /* ── Chat ── */
  #chat{display:none;flex-direction:column;height:100vh;height:100dvh;}
  .chat-header{padding:calc(14px + var(--safe-top)) 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .chat-header-left{display:flex;align-items:center;gap:10px;}
  .header-logo{font-size:18px;font-weight:300;color:var(--text);}
  .header-logo span{color:var(--accent);font-weight:500;}
  .header-right{display:flex;align-items:center;gap:6px;}
  .session-count{font-size:11px;color:var(--memory);background:var(--memory-bg);border:1px solid rgba(107,143,160,0.2);padding:3px 10px;border-radius:99px;display:none;}
  .hdr-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
  .hdr-btn:active{background:var(--bg3);}

  /* ── Mensagens ── */
  .messages{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;background:var(--bg);-webkit-overflow-scrolling:touch;}
  .messages::-webkit-scrollbar{width:3px;}
  .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .center-messages{margin:auto;width:100%;max-width:680px;}

  .msg{display:flex;gap:10px;max-width:680px;width:100%;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.ai{align-self:flex-start;}

  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px;}
  .avatar.ai{background:var(--accent-light);color:var(--accent);border:1px solid var(--user-border);}
  .avatar.user{background:var(--user-bg);color:var(--accent);border:1px solid var(--user-border);}

  .bubble{padding:12px 16px;border-radius:14px;font-size:15px;line-height:1.7;max-width:min(540px,calc(100vw - 72px));}
  .msg.user .bubble{background:var(--user-bg);border:1px solid var(--user-border);color:var(--text);border-top-right-radius:4px;}
  .msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--ai-border);color:var(--text);border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .msg.ai .bubble p{margin:0 0 10px;line-height:1.75;}
  .msg.ai .bubble p:last-child{margin-bottom:0;}

  /* Renderização simples — texto corrido, sem marcadores */
function parseAndRender(text, bubbleEl){
  // Detecta pedido de resumo (legado) — renderiza como texto normal
  if(text.includes('[RESUMO]')||text.includes('[SABEDORIA]')){
    const clean=text.replace(/\[RESUMO\]|\[SABEDORIA\]|\[PLANO\]/g,'').trim();
    bubbleEl.innerHTML=clean.replace(/

/g,'</p><p>').replace(/
/g,'<br>');
    bubbleEl.style.cssText='padding:14px 18px;';
    return;
  }
  // Remove qualquer marcador residual caso existam
  const clean=text
    .replace(/\[ESPELHO\]|\[METÁFORA\]|\[PERGUNTA\]|\[PRÁTICA\]/g,'')
    .trim();
  // Parágrafos separados por linha em branco, linha simples vira <br>
  const html=clean.split(/

+/).map(p=>
    '<p>'+p.replace(/
/g,'<br>')+'</p>'
  ).join('');
  bubbleEl.innerHTML=html;
}

function addMessage(role,text,isHidden=false){
  const el=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg '+role;
  const av=document.createElement('div');av.className='avatar '+role;
  av.textContent=role==='ai'?'E':userName[0].toUpperCase();
  const bubble=document.createElement('div');bubble.className='bubble';
  if(role==='ai'){
    parseAndRender(text, bubble);
  } else {
    bubble.innerHTML=text.replace(/\n/g,'<br>');
  }
  div.appendChild(av);div.appendChild(bubble);
  if(!isHidden) el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  return div;
}

function addTyping(){
  const el=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg ai';div.id='typing-indicator';
  const av=document.createElement('div');av.className='avatar ai';av.textContent='E';
  const bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(av);div.appendChild(bubble);el.appendChild(div);el.scrollTop=el.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}

/* ── Envio de mensagem ── */
function quickStart(t){
  document.getElementById('starters').style.display='none';
  document.getElementById('welcomeArea').style.display='none';
  document.getElementById('userInput').value=t;sendMessage();
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

async function sendMessage(fromBtn=false, overrideText=null){
  if(isLoading) return;
  if(isRecording&&recognition) recognition.stop();

  const input=document.getElementById('userInput');
  const text=overrideText||input.value.trim();
  if(!text) return;

  if(!overrideText){
    input.value='';input.style.height='auto';
    document.getElementById('starters').style.display='none';
    document.getElementById('welcomeArea').style.display='none';
    document.getElementById('voiceStatus').textContent='';
    addMessage('user',text);
  }

  conversationHistory.push({role:'user',content:text});
  saveCurrentSession();

  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('micBtn').disabled=true;
  addTyping();

  try{
    let system=SYSTEM_PROMPT+`\n\nO nome da pessoa é ${userName}.`;
    if(sessionMemory) system+=`\n\nMEMÓRIA DE SESSÕES ANTERIORES:\n${sessionMemory}\n\nUse para dar continuidade quando relevante.`;

    // Timeout de 30s para evitar espera infinita
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),30000);

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:600,system,
        messages:conversationHistory.slice(-20)})
    });
    clearTimeout(timeout);
    const data=await res.json();
    removeTyping();

    if(data.error){
      const tipo=data.error.type||'';
      let msg='Algo deu errado. Tente novamente.';
      if(tipo==='authentication_error'||res.status===401) msg='Chave de API inválida. Verifique nas configurações (⚙).';
      else if(tipo==='rate_limit_error'||res.status===429) msg='Muitas mensagens seguidas. Aguarde alguns segundos e tente de novo.';
      else if(res.status===529||tipo==='overloaded_error') msg='O serviço está sobrecarregado agora. Tente em alguns instantes.';
      else if(data.error.message) msg=data.error.message;
      addMessage('ai',msg);
      document.getElementById('endWithSummaryBtn').disabled=false;
      document.getElementById('endWithSummaryBtn').textContent='encerrar';
    } else {
      const reply=data.content?.[0]?.text||'...';
      conversationHistory.push({role:'assistant',content:reply});
      addMessage('ai',reply);
      saveCurrentSession();
    }
  } catch(err) {
    removeTyping();
    console.error('[Espelho] Erro fetch:', err.name, err.message);
    let msg='';
    if(err.name==='AbortError') msg='A resposta demorou demais (timeout). Tente de novo.';
    else if(!navigator.onLine) msg='Sem internet. Reconecte e tente de novo.';
    else if(err.message&&err.message.includes('Failed to fetch')) msg='Erro de rede. Se o problema persistir, tente fechar e reabrir o app.';
    else msg='Erro ('+err.name+'): '+(err.message||'desconhecido')+'. Tente de novo.';
    addMessage('ai',msg);
    document.getElementById('endWithSummaryBtn').disabled=false;
    document.getElementById('endWithSummaryBtn').textContent='encerrar';
  }

  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('micBtn').disabled=false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
