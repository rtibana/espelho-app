<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espelho — seu espaço de reflexão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #1a1916;
    --bg3: #242320;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e4dc;
    --muted: #7a7568;
    --accent: #c9b99a;
    --accent2: #8fa89c;
    --user-bg: #1e2420;
    --user-border: rgba(143,168,156,0.25);
    --ai-bg: #1c1b18;
    --ai-border: rgba(201,185,154,0.15);
    --tag-1: #2a2318; --tag-1b: #c9b99a;
    --tag-2: #182220; --tag-2b: #8fa89c;
    --tag-3: #1e1a24; --tag-3b: #a99abf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Setup screen */
  #setup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    min-height: 100vh;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .logo em { font-style: italic; color: var(--accent); }
  .tagline {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 48px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .setup-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
  }
  .setup-card label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .setup-card input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .setup-card input:focus { border-color: var(--accent); }
  .setup-card input::placeholder { color: var(--muted); }
  .topic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .topic-btn {
    padding: 10px 8px;
    border-radius: 8px;
    border: 0.5px solid var(--border2);
    background: var(--bg3);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .topic-btn:hover { border-color: var(--border2); color: var(--text); }
  .topic-btn.active.t1 { background: var(--tag-1); border-color: var(--tag-1b); color: var(--tag-1b); }
  .topic-btn.active.t2 { background: var(--tag-2); border-color: var(--tag-2b); color: var(--tag-2b); }
  .topic-btn.active.t3 { background: var(--tag-3); border-color: var(--tag-3b); color: var(--tag-3b); }
  .start-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #1a1510;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .start-btn:hover { opacity: 0.9; }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
    line-height: 1.6;
  }
  .note a { color: var(--accent); text-decoration: none; }

  /* Chat screen */
  #chat { display: none; flex-direction: column; height: 100vh; }
  .chat-header {
    padding: 16px 24px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: var(--text); }
  .header-logo em { font-style: italic; color: var(--accent); }
  .topic-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 400;
  }
  .tb1 { background: var(--tag-1); color: var(--tag-1b); border: 0.5px solid var(--tag-1b); }
  .tb2 { background: var(--tag-2); color: var(--tag-2b); border: 0.5px solid var(--tag-2b); }
  .tb3 { background: var(--tag-3); color: var(--tag-3b); border: 0.5px solid var(--tag-3b); }
  .reset-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--border2); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }
  .avatar.ai { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--accent); }
  .avatar.user { background: var(--user-bg); border: 0.5px solid var(--user-border); color: var(--accent2); font-style: normal; font-size: 11px; font-family: 'DM Sans', sans-serif; }

  .bubble {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.65;
    max-width: 560px;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 0.5px solid var(--user-border);
    color: var(--text);
    border-top-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 0.5px solid var(--ai-border);
    color: var(--text);
    border-top-left-radius: 4px;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 16px;
    font-style: italic;
  }
  .msg.ai .bubble strong { font-style: normal; font-weight: 400; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 16px 18px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

  .input-area {
    padding: 16px 24px 24px;
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 12px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(201,185,154,0.3); }
  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }
  #sendBtn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .center-messages { margin: auto; width: 100%; max-width: 720px; }

  .topic-pills {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .topic-pill {
    padding: 7px 16px;
    border-radius: 99px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
    border: 0.5px solid;
  }
  .topic-pill:hover { opacity: 0.75; }
  .tp1 { background: var(--tag-1); color: var(--tag-1b); border-color: var(--tag-1b); }
  .tp2 { background: var(--tag-2); color: var(--tag-2b); border-color: var(--tag-2b); }
  .tp3 { background: var(--tag-3); color: var(--tag-3b); border-color: var(--tag-3b); }

  .welcome-msg {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .welcome-msg em { color: var(--accent); font-style: normal; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="logo"><em>espelho</em></div>
  <div class="tagline">um espaço para pensar em voz alta</div>

  <div class="setup-card">
    <label>Sua chave da API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">

    <label>Escolha o tema desta conversa</label>
    <div class="topic-grid">
      <button class="topic-btn t1" data-topic="saude">Saúde mental & ansiedade</button>
      <button class="topic-btn t2" data-topic="relacionamentos">Relacionamentos & família</button>
      <button class="topic-btn t3" data-topic="identidade">Identidade & autoconhecimento</button>
    </div>

    <label>Seu nome (opcional)</label>
    <input type="text" id="userName" placeholder="Como posso te chamar?">

    <button class="start-btn" id="startBtn" disabled onclick="startChat()">Começar →</button>
    <p class="note">
      Sua chave é usada apenas no seu navegador e nunca enviada a servidores externos além da Anthropic.<br>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">Obter chave gratuita →</a>
    </p>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="header-logo"><em>espelho</em></div>
      <span class="topic-badge" id="headerBadge"></span>
    </div>
    <button class="reset-btn" onclick="resetChat()">← trocar tema</button>
  </div>

  <div class="messages" id="messages">
    <div class="center-messages">
      <div id="welcomeArea"></div>
      <div class="topic-pills" id="topicPills"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Escreva o que está sentindo ou pensando..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1510" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <p class="disclaimer">Protótipo experimental · Não substitui acompanhamento profissional</p>
  </div>
</div>

<script>
const TOPICS = {
  saude: {
    label: 'Saúde mental & ansiedade',
    class: 'tb1', pillClass: 'tp1',
    starters: [
      'Algo tem me pesado ultimamente',
      'Quero entender minha ansiedade',
      'Me sinto sobrecarregado(a)'
    ],
    system: `Você é um interlocutor socrático especializado em saúde mental e bem-estar emocional.

Seu papel é ajudar a pessoa a explorar seus próprios pensamentos e sentimentos através de perguntas cuidadosas — nunca dar respostas prontas, diagnósticos ou conselhos diretos.

Diretrizes:
- Faça UMA pergunta por vez, profunda e gentil
- Use linguagem acolhedora, não clínica
- Reflita de volta o que a pessoa disse antes de perguntar
- Se detectar sofrimento intenso, valide o sentimento e pergunte se a pessoa tem apoio profissional
- Nunca minimize, nunca resolva: aprofunde
- Mantenha tom quente, presente, sem julgamento
- Respostas curtas: máximo 3 frases + 1 pergunta

Temas centrais: ansiedade, estresse, autopercepção, emoções difíceis, padrões de comportamento, bem-estar.`
  },
  relacionamentos: {
    label: 'Relacionamentos & família',
    class: 'tb2', pillClass: 'tp2',
    starters: [
      'Tenho conflito com alguém próximo',
      'Quero entender um padrão nas minhas relações',
      'Algo mudou na minha família'
    ],
    system: `Você é um interlocutor socrático especializado em dinâmicas relacionais e vínculos afetivos.

Seu papel é ajudar a pessoa a examinar suas relações com curiosidade e sem julgamento — nunca tomar partido, nunca aconselhar diretamente.

Diretrizes:
- Faça UMA pergunta por vez, que abra perspectivas novas
- Explore o ponto de vista da pessoa E a perspectiva do outro envolvido
- Pergunte sobre padrões, não apenas eventos isolados
- Use frases como "o que te leva a pensar isso?" e "como você acha que a outra pessoa viveu esse momento?"
- Respostas curtas: máximo 3 frases + 1 pergunta
- Tom: curioso, neutro, acolhedor

Temas: conflitos, comunicação, expectativas, fronteiras, dinâmicas familiares, apego, vínculos.`
  },
  identidade: {
    label: 'Identidade & autoconhecimento',
    class: 'tb3', pillClass: 'tp3',
    starters: [
      'Estou questionando quem sou',
      'Sinto que estou num momento de mudança',
      'Quero entender meus valores mais profundos'
    ],
    system: `Você é um interlocutor socrático especializado em autoconhecimento, identidade e desenvolvimento pessoal.

Seu papel é guiar a pessoa numa exploração filosófica de si mesma — usando o método socrático para revelar contradições, crenças ocultas e possibilidades não percebidas.

Diretrizes:
- Faça UMA pergunta por vez — profunda, que faça a pessoa parar
- Pode referenciar levemente ideias de filósofos ou psicólogos quando pertinente (sem citar longamente)
- Explore crenças subjacentes: "o que te faz assumir isso como verdade?"
- Provoque gentilmente quando detectar contradição: "você disse X antes, e agora Y — o que acha disso?"
- Respostas curtas: máximo 3 frases + 1 pergunta
- Tom: filosófico, respeitoso, instigante

Temas: valores, propósito, identidade, crenças, autoimagem, escolhas de vida, crescimento.`
  }
};

let selectedTopic = null;
let conversationHistory = [];
let apiKey = '';
let userName = '';
let isLoading = false;

// Topic selection
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTopic = btn.dataset.topic;
      updateStartBtn();
    });
  });
  document.getElementById('apiKey').addEventListener('input', updateStartBtn);
});

function updateStartBtn() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('startBtn').disabled = !(key && selectedTopic);
}

function startChat() {
  apiKey = document.getElementById('apiKey').value.trim();
  userName = document.getElementById('userName').value.trim() || 'você';

  document.getElementById('setup').style.display = 'none';
  const chatEl = document.getElementById('chat');
  chatEl.style.display = 'flex';

  const topic = TOPICS[selectedTopic];
  const badge = document.getElementById('headerBadge');
  badge.textContent = topic.label;
  badge.className = 'topic-badge ' + topic.class;

  const welcomeArea = document.getElementById('welcomeArea');
  welcomeArea.innerHTML = `
    <div class="welcome-msg">
      Olá${userName !== 'você' ? ', <em>' + userName + '</em>' : ''}. Este é um espaço só seu.<br>
      Não há respostas certas aqui — só perguntas que abrem caminhos.<br>
      Por onde quer começar?
    </div>`;

  const pillsEl = document.getElementById('topicPills');
  topic.starters.forEach(s => {
    const p = document.createElement('button');
    p.className = 'topic-pill ' + topic.pillClass;
    p.textContent = s;
    p.onclick = () => quickStart(s);
    pillsEl.appendChild(p);
  });

  conversationHistory = [];
}

function quickStart(text) {
  document.getElementById('topicPills').style.display = 'none';
  document.getElementById('welcomeArea').style.display = 'none';
  document.getElementById('userInput').value = text;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, text) {
  const messagesEl = document.getElementById('messages');
  const centerDiv = messagesEl.querySelector('.center-messages') || messagesEl;

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'ai' ? 'E' : (userName !== 'você' ? userName[0].toUpperCase() : 'V');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function addTyping() {
  const messagesEl = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = 'E';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('topicPills').style.display = 'none';
  document.getElementById('welcomeArea').style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  try {
    const topic = TOPICS[selectedTopic];
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5-20250929',
        max_tokens: 400,
        system: topic.system + (userName !== 'você' ? `\n\nO nome da pessoa é ${userName}.` : ''),
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addMessage('ai', '⚠ Erro: ' + (data.error.message || 'Chave inválida ou limite atingido.'));
    } else {
      const reply = data.content?.[0]?.text || '...';
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    }
  } catch (err) {
    removeTyping();
    addMessage('ai', '⚠ Não foi possível conectar. Verifique sua chave e conexão.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function resetChat() {
  document.getElementById('chat').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('messages').innerHTML = '<div class="center-messages"><div id="welcomeArea"></div><div class="topic-pills" id="topicPills"></div></div>';
  conversationHistory = [];
  selectedTopic = null;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  updateStartBtn();
}
</script>
</body>
</html>
